<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown to Confluence Wiki Markup</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1e1e2e;
  --surface: #282840;
  --border: #3e3e5e;
  --text: #e0e0f0;
  --text-muted: #888;
  --accent: #7c6ff7;
  --accent-hover: #9b8fff;
  --green: #4caf50;
  --header-h: 56px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }

.toolbar { display: flex; align-items: center; gap: 10px; }

.toolbar button {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface); 
  color: var(--text); 
  font-size: 13px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.toolbar button:hover { background: var(--border); border-color: var(--accent); } 
.toolbar button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.toolbar button-primary:hover { background: var(--accent-hover); }
.toolbar button.copied { background: var(--green); border-color: var(--green); color: #fff; }
.toolbar label {
  font-size: 13px; display: flex; align-items: center; gap: 4px; 
  cursor: pointer; user-select: none;
}

.panels {
  flex: 1;
  display: grid; 
  grid-template-columns: 1fr 1fr;
  min-height: 0;
}
.panel { display: flex; flex-direction: column; min-height: 0; }
.panel:first-child { border-right: 1px solid var(--border); }
.panel-label {
  padding: 6px 14px; font-size: 11px; font-weight: 600; 
  text-transform: uppercase; letter-spacing: .06em; 
  color: var(--text-muted); background: var(--surface); 
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}

#markdown-input {
  flex: 1; width: 100%; resize: none; padding: 14px; 
  font-family: "SF Mono", "Fira Code", Consolas, monospace; 
  font-size: 13px; line-height: 1.6; 
  background: var(--bg); color: var(--text); 
  border: none; outline: none; tab-size: 4;
}

#confluence-output {
  flex: 1; overflow: auto; padding: 14px; 
  font-family: "SF Mono", "Fira Code", Consolas, monospace; 
  font-size: 13px; line-height: 1.6; 
  white-space: pre-wrap; word-break: break-word; 
  background: var(--bg); color: #c8d6c0;
}

@media (max-width: 768px) {
  .panels { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  .panel:first-child { border-right: none; border-bottom: 1px solid var(--border); }
}
</style> 
</head>
<body>

<header>
  <h1>Markdown &rarr; Confluence Wiki Markup</h1> 
  <div class="toolbar">
    <label><input type="checkbox" id="toc-toggle"> TOC</label>
    <button id="btn-sample">Load Sample</button>
    <button id="btn-clear">Clear</button>
    <button id="btn-copy" class="primary">Copy</button>
  </div>
</header>

<div class="panels">
  <div class="panel">
    <div class="panel-label">Markdown (GFM)</div>
    <textarea id="markdown-input" spellcheck="false" placeholder="Paste your Markdown here..."></textarea>
  </div>
  <div class="panel">
    <div class="panel-label">Confluence Wiki Markup</div>
    <pre id="confluence-output"></pre>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>

const GFM_ALERT_MAP = {
  "NOTE": "info",
  "TIP": "tip",
  "IMPORTANT": "note",
  "WARNING": "warning",
  "CAUTION": "warning",
};

// -----------------------------------------------------------
// Helpers
// -----------------------------------------------------------

const EMOJI_RE = /:([a-zA-Z0-9_+-]+):/g;
function emo(text) {
  return text.replace(EMOJI_RE, (m, code) => EMOJI_MAP[code] || m);
}

function stripTags (s) { return s.replace(/<[^>]+>/g, ""); }

// Module-level list state (marked doesn't preserve custom props on renderer)
let _listDepth = 0;
let _listordered = false;

// -----------------------------------------------------------
// Confluence Wiki Markup renderer for marked.js
//
// Reference: https://confluence.atlassian.com/doc/
// confluence-wiki-markup-251003035.html
//
// Cheat sheet:
// h1. Heading            *bold*              _italic_
// -strikethrough-        +underline+         {{monospace}}
// [text|url]             !image.png!
// {code: lang}...{code}  {quote}... {quote}
// {info}...{info}        {warning}... {warning}
// {note}...{note}        {tip}...{tip}
// || header || header || \n | cell | cell |
// * bullet               # numbered
// ** nested              ## nested
// ---                    {toc}
// -----------------------------------------------------------

const wikiRenderer = {
  // -- Block-level
  heading({ tokens, depth }) {
    const text = this.parser.parseInline(tokens);
    return `h${depth}. ${text}\n\n`;
  },

  paragraph({ tokens }) {
    const text = this.parser.parseInline(tokens);
    return `${text}\n\n`;
  },

  hr() {
    return "----\n\n";
  },

  code({ text, lang }) {
    const language = lang ? lang.split(/\s/, 1)[0] : "";
    const title = lang && lang.includes(" ") ? lang.slice(language.length).trim() : "";
    let params = [];
    if (language) params.push(`language=${language}`);
    if (title) params.push(`title=${title}`);
    params.push("linenumbers=true");
    const paramStr = params.join("|");
    return `{code:${paramStr}}\n${text}\n{code}/\n\n`;
  },

  blockquote({ tokens }) {
    const inner = this.parser.parse(tokens);

    // GM alert: first line starts with [!TYPE]
    const alertMatch = inner.match(/^\s*\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*\n?/);
    if (alertMatch) {
      const macroName = GFM_ALERT_MAP[alertMatch[1]];
      const body = inner.slice(alertMatch[0].length).trim();
      return `{${macroName}:title=${alertMatch[1]}}\n${body}\n{${macroName}}\n\n`;
    }
    return `{quote}\n${inner.trim()}\n{quote}\n\n`;
  },

  list({ items, ordered }) {
    const prevOrdered = _listOrdered;
    _listOrdered = ordered;
    _listDepth++;
    const body = items.map(item => this.listitem(item)).join("");
    _listDepth--;
    _listOrdered = prevOrdered;
    return body + (_listDepth === 0 ? "\n" : "");
  },

  listitem(item) {
    const bullet = _listOrdered ? "#".repeat(_listDepth) : "*".repeat(_listDepth);

    // Task list
    if (item.task) {
      const mark = item.checked ? "(/)" : "(x)";
      const text = this.parser.parseInline(item.tokens).trim();
      return `${bullet} ${mark} ${text}\n`;
    }

    // Separate nested lists from inline content
    const inlineTokens = [];
    const sublists = [];
    for (const t of item.tokens) {
      if (t.type === "list") {
        subLists.push(t) ;
      } else {
        inlineTokens.push(t);
      }
    }

    // Render inline part
    let text;
    if (inlineTokens.length === 1 && inlineTokens[0].type === "text" && inlineTokens[0].tokens) {
      text = this.parser.parseInline(inlineTokens[0].tokens);
    } else if (inlineTokens.length === 1 && inlineTokens[0].type === "paragraph") {
      text = this.parser.parseInline(inlineTokens[0].tokens);
    } else {
      text = inlineTokens.map(t => {
        if (t.type === "text" && t.tokens) return this.parerparInline(t.tokens);
        if (t.type === "paragraph") return this.parser.parseInline(t.tokens);
        return this.parser.parse([t]);
      }).join("").trim();
    }

    let result = `${bullet} ${text.trim()}\n`;

    // Render nested lists
    for (const sub of sublists) {
      result += this.list(sub);
    }

    return result;
  },

  // - Table -------
  table({ header, rows }) {
    let out = "";
    // Header row: || col1 || col2 ||
    out += header.map(cell => {
      const text = this.parser.parseInline(cell.tokens) ;
      return `|| ${text} `;
    }).join("") + "||\n";
    // Data rows: | col1 | col2 |
    for (const row of rows) {
      out += row.map(cell => {
        const text = this.parser.parseInline(cell.tokens);
        return `| ${text} `;
      }).join("") + "|\n";
    }
    return out + "\n";
  },

  // - Inline ---------

  text({ tokens, text }) {
    if (tokens) return this.parser.parseInline(tokens);
    return emo(text);
  },

  strong({ tokens }) {
    return `*${this.parser.parseInline(tokens)}*`;
  },

  em({ tokens }) {
    return `_${this.parser.parseInline(tokens)}_`;
  },

  codespan({ text }) {
    // Escape curly braces so they don't clash with Confluence's
    // {{monospace}} delimiters or {macro} syntax
    const safe = text.replace(/\{/g, "\\{").replace(/\}/g, "\\}");
    return `{{${safe}}}`;
  },

  del({ tokens }) {
    return `-${this.parser.parseInline(tokens)}-`;
  },

  br() {
    return "\\\\\n";
  },

  link({ tokens, href, title }) {
    const text = this.parser.parseInline(tokens);
    if (!href) return text;

    // Internal .md link → Confluence page link
    const mdMatch = href.match(/(?:\.\/)?([^#]+)\.md(?:#(.+))?$/);
    if (mdMatch) {
      const pageTitle = mdMatch[1].replace(/[-_]/g, " ");
      const anchor = mdMatch[2] ? `#${mdMatch[2]}` : "";
      return `[${text}|${pageTitle}${anchor}|`;
    }

    // Anchor-only link
    if (href.startsWith("#")) {
      return `[${text}|${href}]`;
    }

    // External link
    const plain = stripTags(text);
    if (plain === href) return `[$(href)]`; 
    return `[${plain}|${href}]`;
  },

  image({ href, text, title }) {
    // Wiki markup: !url! or !filename!
    // With attributes: !url|alt=text, title=text!
    let params = [];
    if (text) params.push(`alt=${text}`);
    if (title) params.push(`title=${title}`);
    const paramStr = params.length ? "|" + params.join(",") : "";

    if (href.startsWith("http://") || href.startswith("https://")) {
      return `!${href}${paramStr}!`;
    }
    // Local attachment - use filename only
    const filename = href.split("/").pop();
    return `!${filename}${paramStr}!`;
  },

  html({ text }) {
    return text;
  },

  space() {
    return "";
  },
};

// -------------------------------------------------
// Footnote + Definition List pre-processing
// -------------------------------------------------

function preprocessFootnotes(md) {
  const defs = {};
  const defRe = /^\[\^([^\]]+)\]:\s*(.+)$/gm;
  let m;
  while ((m = defRe.exec(md)) !== null) {
    defs[m[1]] = m[2];
  }
  let out = md.replace(/^\[\^([^\]]+)\]:\s*.+$/gm, "");

  let idx = 0;
  const usedKeys = [];
  out = out.replace(/\[\^([^\]]+)\]/g, (match, key) => {
    if (defs[key] === undefined) return match;
    idx++;
    usedKeys.push(key); 
    return `^${idx}^`;
  });

  if (usedKeys.length > 0) {
    let fnBlock = "\n----\n\n{expand:Footnotes}\n";
    usedKeys.forEach((key, i) => {
      fnBlock += `# ${defs[key]}\n`;
    });
    fnBlock += "{expand}\n";
    out = out.trimEnd() + "\n" + fnBlock;
  }

  return out;
}

function preprocessDefinitionLists(md) {
  const lines = md.split("\n");
  const result = [];
  let i = 0;
  while (i < lines.length) {
    if (
      i + 1 < lines.length &&
      lines[i].trim() !== "" &&
      !lines[i].startsWith(":") &&
      /^:\s{3,}/.test(lines[i + 1])
    ) {
      const term = lines[i].trim();
      let defs = [];
      i++;
      while (i < lines.length && /^:\s{3,}/.test(lines[i])) {
        defs.push(lines[i].replace(/^:\s{3,}/, "").trim());
        i++;
      }
      // Emit as a mini table: term | definition
      result.push(`|| Term || Definition ||`);
      result.push(`| *${term}* | ${defs.join(" \\\\ ")} |`);
      result.push("");
    } else {
      result.push(lines[i]); 
      i++;
    }
  }
  return result.join("\n");
}

// -------------------------------------------------
// Configure marked
// -------------------------------------------------
marked.use({
  renderer: wikiRenderer, 
  gtm: true, 
  breaks: false,
});

function convert(markdown) {
  let md = markdown;
  md = preprocessFootnotes(md);
  md = preprocessDefinitionLists(md);

  let result = marked.parse(md);

  // Clean up excessive blank lines (3+ → 2)
  result = result.replace(/\n{3,}/g, "\n\n");

  if (document.getElementById("toc-toggle").checked) {
    result = "{toc}\n\n" + result;
  }

  return result.trim() + "\n";
}

// -------------------------------------------------
// UI wiring
// -------------------------------------------------
const inputEl = document.getElementById("markdown-input");
const outputEl= document.getElementById("confluence-output");
const btnCopy = document.getElementById("btn-copy");
const btnClear = document.getElementById("btn-clear");
const btnSample = document.getElementById("btn-sample");
const tocToggle = document.getElementById("toc-toggle");

let debounceTimer = null;
function scheduleConvert() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    outputEl.textContent = convert(inputEl.value);
  }, 300);
}

inputEl.addEventListener("input", scheduleConvert); 
tocToggle.addEventListener("change", () => {
  clearTimeout(debounceTimer);
  outputEl.textContent = convert(inputEl.value);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Tab") {
    e.preventDefault() ;
    const start = inputEl.selectionStart;
    const end = inputEl.selectionEnd;
    inputEl.value = inputEl.value.substring(0, start) + "    " + inputEl.value.substring(end);
    inputEl.selectionStart = inputEl.selectionEnd = start + 4;
    scheduleConvert();
  }
});

btnCopy.addEventListener("click", () => {
  const text = outputEl.textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    btnCopy.textContent = "Copied!";
    btnCopy.classList.add("copied");
    setTimeout (() => {
      btnCopy.textContent = "Copy";
      btnCopy.classList.remove("copied");
    }, 1500);
  });
});

btnClear.addEventListener("click", () => {
  inputEl.value = "";
  outputEl.textContent = "";
  inputEl.focus();
});
